    License:
      type: object
      title: License
      properties:
        license_ref:
          type: string
          format: url
          title: License Reference
          description: Link to license document.
          examples:
            - https://creativecommons.org/licenses/by/4.0/
        start_date:
          type: string
          format: date
          title: Start Date
          description: If date is set in the future, it indicates embargo period. Encoded
            using the relevant ISO 8601 Date compliant string.
          examples:
            - "2019-06-30"
      required:
        - license_ref
        - start_date
    Licenses:
      type: array
      title: Licenses
      description: To list all licenses applied to a specific distribution of data.
      items:
        $ref: "#/components/schemas/License"
    Metadata:
      type: object
      title: Metadata
      properties:
        description:
          type: string
          title: Description
          description: To provide any details on the choice of the metadata standard
          examples:
            - The ISO 19115 Metadata Standard is applied to describe each
              geospatial dataset. Metadata includes the satellite's sensor type
              (e.g. Landsat 8 OLI), acquisition date, spatial resolution (30m),
              and cloud cover percentage.
        language:
          $ref: "#/components/schemas/LanguageCode"
        metadata_standard_id:
          oneOf:
            - $ref: "#/components/schemas/MetadataStandardID"
            - type: array
              items:
                $ref: "#/components/schemas/MetadataStandardID"
              minItems: 1
      required:
        - language
        - metadata_standard_id
    MetadataStandardID:
      type: object
      title: Metadata Standard ID
      properties:
        identifier:
          type: string
          title: Identifier
          examples:
            - http://www.dublincore.org/specifications/dublin-core/dcmi-terms/
        type:
          type: string
          enum:
            - url
            - other
          title: Type
          description: "Identifier type. Suggested values: url"
          examples:
            - url
      required:
        - identifier
        - type
    PIDSystems:
      type: array
      title: PID System
      description: "PID system(s). Allowed values: ark, arxiv, bibcode, doi, ean13,
        eissn, handle, igsn, isbn, issn, istc, lissn, lsid, pmid, purl, upc, url,
        urn, other"
      items:
        $ref: "#/components/schemas/PIDSystemType"
    PIDSystemType:
      type: string
      title: PID System Type
      enum:
        - ark
        - arxiv
        - bibcode
        - doi
        - ean13
        - eissn
        - handle
        - igsn
        - isbn
        - issn
        - istc
        - lissn
        - lsid
        - pmid
        - purl
        - upc
        - url
        - urn
        - other
      examples:
        - doi
    Project:
      type: object
      title: Project
      properties:
        description:
          type: string
          title: Description
          description: Project abstract providing an overview of the project's goals and scope
          examples:
            - This project aims to analyze the impact of urbanization on local
              biodiversity by collecting and assessing environmental data from
              multiple urban centers. Using remote sensing, field observations,
              and statistical modeling, the study will identify key factors
              influencing species diversity and habitat loss. The findings will
              support sustainable urban planning initiatives and inform
              conservation strategies.
        end:
          type: string
          format: date
          title: End
          description: Project end date. Encoded using the relevant ISO 8601 Date
            compliant string
          examples:
            - "2020-03-31"
        funding:
          $ref: "#/components/schemas/Fundings"
        project_id:
          type: array
          items:
            $ref: "#/components/schemas/ProjectID"
          minItems: 0
        start:
          type: string
          format: date
          title: Start
          description: Project start date. Encoded using the relevant ISO 8601 Date
            compliant string
          examples:
            - "2019-04-01"
        title:
          type: string
          title: Title
          description: Project title
          examples:
            - Our New Project
      required:
        - title
    ProjectID:
      type: object
      title: Project ID
      properties:
        identifier:
          type: string
          title: Identifier
          examples:
            - https://example.org/project
        type:
          type: string
          title: Type
          description: "Identifier type. Suggested values: doi, raid, url"
          examples:
            - url
            - doi
            - raid
      required:
        - identifier
        - type
    RelatedIdentifier:
      type: object
      title: Related Identifier
      properties:
        identifier:
          type: string
          title: Identifier
          examples:
            - https://example.com/
        metadata_scheme:
          type: string
          title: Metadata Scheme
          description: Name of the related metadata schema (if applicable)
          examples:
            - DDI-L
        relation_type:
          type: string
          title: Relation Type
          description: "Type of relation between the resource and the related resource,
            suggested values from DataCite relationType:
            https://datacite-metadata-schema.readthedocs.io/en/4.5/appendices/app\
            endix-1/relationType/"
          examples:
            - HasMetadata
        resource_type:
          type: string
          title: Resource Type
          description: "Type of the related resource, suggested values from DataCite
            resourceTypeGeneral:
            https://datacite-metadata-schema.readthedocs.io/en/4.5/appendices/app\
            endix-1/resourceTypeGeneral/"
          examples:
            - Model
        scheme_type:
          type: string
          title: Scheme Type
          description: Type of the related metadata scheme linked with scheme URI (if
            applicable)
          examples:
            - XSD
        scheme_uri:
          type: string
          format: uri
          title: Scheme URI
          description: Link to the scheme of the identifier (if applicable)
          examples:
            - http://www.ddialliance.org/Specification/DDI-Lifecycle/3.1/XMLSchema/instance.xsd
        type:
          type: string
          title: Type
          description: "Type of the identifier, suggested values from DataCite
            relatedIdentifierType:
            https://datacite-metadata-schema.readthedocs.io/en/4.5/appendices/app\
            endix-1/relatedIdentifierType/"
          examples:
            - url
      required:
        - identifier
        - type
        - relation_type
    SecurityAndPrivacyItem:
      type: object
      title: Security and Policy
      properties:
        description:
          type: string
          title: Description
          description: Describe a security and privacy measure applied to a dataset to
            protect sensitive information
          examples:
            - The dataset undergoes anonymization by applying data masking
              techniques. Names, addresses, and phone numbers are replaced with
              pseudonyms or randomly generated identifiers. Specific details, such
              as exact birthdates, are generalized into age ranges.
        title:
          type: string
          title: Title
          description: Title a measure applied to a dataset
          examples:
            - Anonymization of Personally Identifiable Data
      required:
        - title
    SecurityAndPrivacyItems:
      type: array
      title: Security and Policy Items
      description: To list all issues and requirements related to security and privacy
      items:
        $ref: "#/components/schemas/SecurityAndPrivacyItem"
    TechnicalResource:
      type: object
      title: Technical Resource
      properties:
        description:
          type: string
          title: Description
          description: Describe a technical resource (e.g. tools or software) required for
            any stage of a dataset lifecycle (e.g. microscopes, sensors, Jupyter
            Notebook, Galaxy workflows, measuring devices)
          examples:
            - The Celestron 44102 Inverted Biological Microscope was used to
              examine biological samples, such as cells and microorganisms, with
              high-resolution optics.
        name:
          type: string
          title: Name
          description: Name a resource applied to a dataset
          examples:
            - Celestron Microscope
        technical_resource_id:
          type: array
          items:
            $ref: "#/components/schemas/TechnicalResourceID"
          minItems: 0
      required:
        - name
    TechnicalResourceID:
      type: object
      title: Technical Resource ID
      properties:
        identifier:
          type: string
          title: Identifier
          examples:
            - https://example.org/resource
        type:
          type: string
          title: Type
          description: "Identifier type. Suggested values: url"
          examples:
            - url
            - doi
            - other
      required:
        - identifier
        - type
    TechnicalResources:
      type: array
      title: Technical Resources
      description: To list all technical resources needed to implement a DMP
      items:
        $ref: "#/components/schemas/TechnicalResource"


    #endregion