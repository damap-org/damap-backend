        title:
          type: string
          title: Title
          examples:
            - Super Repository
        url:
          type: string
          format: url
          title: URL
          description: A URL of an infrastructure hosting a distribution of a dataset
          examples:
            - https://zenodo.org
      required:
        - title
        - url
