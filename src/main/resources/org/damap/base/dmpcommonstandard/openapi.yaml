    DataAccess:
      type: string
      enum:
        - open
        - shared
        - closed
      title: Data Access
      description: "Indicates access mode for data. Allowed values: open, shared, closed"
      examples:
        - open
    Dataset:
      type: object
      title: Dataset
      properties:
        alternate_identifier:
          type: array
          items:
            $ref: "#/components/schemas/AlternateIdentifier"
          minItems: 0
        creator:
          type: array
          title: Creators
          items:
            $ref: "#/components/schemas/Creator"
        data_quality_assurance:
          type: array
          title: Data Quality Assurance
          description: To describe any quality assurance processes applied to a dataset,
            such as, to ensure its accuracy, reliability, consistency, and
            usability for its intended purposes. This includes systematic
            practices, procedures, and policies designed to maintain high data
            quality throughout its lifecycle.
          items:
            type: string
            examples:
              - We calibrate measuring equipment daily, run repeat samples to
                monitor consistency in measurements and results, and cross-check
                collected data with at least two colleagues for accuracy.
        dataset_id:
          $ref: "#/components/schemas/DatasetID"
        description:
          type: string
          title: Description
          description: Description is a property in both Dataset and Distribution, in
            compliance with W3C DCAT. In some cases these might be identical, but
            in most cases the Dataset represents a more abstract concept, while
            the distribution can point to a specific file.
          examples:
            - The dataset includes detailed measurements of temperature, humidity,
              and soil moisture levels collected at various time intervals (every
              30 minutes) across multiple locations. The dataset will also include
              metadata such as GPS coordinates, sensor calibration data, and
              environmental conditions. The primary objective of this dataset is
              to analyze the correlation between these variables and their impact
              on plant growth patterns over a 6-month period.
        distribution:
          type: array
          title: Distributions
          description: To provide technical information on a specific instance of data.
          items:
            $ref: "#/components/schemas/Distribution"
        is_reused:
          type: boolean
          title: The Dataset Is Reused Schema
          description: Indicates if the dataset is reused, i.e., not produced in
            project(s) covered by this DMP.
          examples:
            - true
        issued:
          type: string
          format: date
          title: Issued
          description: To indicate a date when a dataset was published or released.
            Encoded using the relevant ISO 8601 Date compliant string.
          examples:
            - "2019-06-30"
        keyword:
          type: array
          title: Keywords
          items:
            type: string
            title: Keyword
            examples:
              - keyword 1
              - keyword 2
        language:
          $ref: "#/components/schemas/LanguageCode"
        metadata:
          type: array
          title: Metadata
          description: To describe metadata standards used.
          items:
            $ref: "#/components/schemas/Metadata"
        personal_data:
          type: string
          enum:
            - "yes"
            - "no"
            - unknown
          title: Personal Data
          description: "To indicate whether a dataset contains personal data. Personal
            data refers to any data that can identify an individual (e.g. name,
            birthdate, address, voice recordings, etc.). Allowed values: yes, no,
            unknown"
          examples:
            - unknown
        preservation_statement:
          type: string
          title: Preservation Statement
          description: To outline a plan for how and why a dataset will be preserved for
            long-term access, including for example storage redundancy, integrity
            checks (checksums, fixity checks), format migration,  and a
            sustainability plan ensuring institutional commitment and funding.
          examples:
            - All research data will be stored in the university's secure data
              repository, backed up daily to ensure redundancy and prevent data
              loss. The dataset will be preserved in a standardized format (e.g.
              CSV, JSON) and will include detailed metadata for clarity. It will
              be accessible to the public via the university’s open-access
              platform three months after the completion of the project, with
              ongoing access ensured for a minimum of 5 years. Regular checks will
              be performed every 6 months to confirm the integrity and readability
              of the data.
        rights:
          type: string
          title: Rights
          description: A statement that concerns all rights not addressed with license,
            such as copyright statements.
          examples:
            - This dataset incorporates third-party materials that are subject to
              additional rights and restrictions. Users must obtain permission
              from the original rights holders before reuse.
        related_identifier:
          type: array
          items:
            $ref: "#/components/schemas/RelatedIdentifier"
          minItems: 0
        security_and_privacy:
          $ref: "#/components/schemas/SecurityAndPrivacyItems"
        sensitive_data:
          type: string
          enum:
            - "yes"
            - "no"
            - unknown
          title: Sensitive Data
          description: "To indicate whether a dataset contains sensitive data. Sensitive
            data refers to information that could pose risks to individuals or
            organizations for example  financial information, medical records,
            passwords and social security numbers. Allowed values: yes, no,
            unknown"
          examples:
            - unknown
        technical_resource:
          $ref: "#/components/schemas/TechnicalResources"
        title:
          type: string
          title: Title
          description: Title is a property in both Dataset and Distribution, in compliance
            with W3C DCAT. In some cases these might be identical, but in most
            cases the Dataset represents a more abstract concept, while the
            distribution can point to a specific file.
          examples:
            - Fast car images
        type:
          type: string
          title: Type
          description: "If appropriate, type according to: DataCite and/or COAR
            dictionary. Otherwise use the common name for the type, e.g. raw data,
            software, survey, etc.
            https://schema.datacite.org/meta/kernel-4.1/doc/DataCite-MetadataKern\
            el_v4.1.pdf
            http://vocabularies.coar-repositories.org/pubby/resource_type.html"
          examples:
            - image
      required:
        - dataset_id
        - personal_data
        - sensitive_data
        - title
    DatasetID:
      type: object
      title: Dataset ID
      properties:
        identifier:
          type: string
          title: Identifier
          examples:
            - 11353/10.923628
        type:
          type: string
          title: Type
          description: "Dataset identifier type. Suggested values: handle, doi, ark, url"
          examples:
            - handle
      required:
        - identifier
        - type
    Datasets:
      type: array
      title: Datasets
      items:
        $ref: "#/components/schemas/Dataset"
    DMPData:
      type: object
      title: DMP
      description: Provides high level information about the DMP, e.g. its title,
        modification date, etc. It is the root of this application profile. The
        majority of its fields are mandatory.
      properties:
        alternate_identifier:
          type: array
          items:
            $ref: "#/components/schemas/AlternateIdentifier"
          minItems: 0
        contact:
          $ref: "#/components/schemas/Contact"
        contributor:
          $ref: "#/components/schemas/Contributors"
        cost:
          $ref: "#/components/schemas/Costs"
        created:
          type: string
          format: date-time
          title: Created
          description: Date and time of the first version of a DMP. Must not be changed in
            subsequent DMPs. Encoded using the relevant ISO 8601 Date and Time
            (with timezone) compliant string.
          examples:
            - "2019-03-13T13:13:00Z"
        dataset:
          $ref: "#/components/schemas/Datasets"
        description:
          type: string
          title: Description
          description: Any text related to this DMP, optionally describing the project. It
            can include important information that doesn't fit elsewhere.
          examples:
            - This DMP is for our new project
        dmp_id:
          $ref: "#/components/schemas/DMPID"
        ethical_issues_description:
          type: string
          title: Ethical Issues Description
          description: To describe considerations that require compliance with laws and
            regulations (e.g. GDPR, animal welfare) due to the involvement of
            humans, animals, or sensitive information. This includes ensuring
            informed consent from participants, protecting privacy and
            confidentiality, and adhering to applicable legal and ethical
            standards throughout the research.
          examples:
            - There are ethical issues, because...
        ethical_issues_exist:
          $ref: "#/components/schemas/Booleanish"
        ethical_issues_report:
          type: string
          title: Ethical Issues Report
          description: To indicate where a report/document that details all identified
            ethical issues (might be for example emit from a meeting with an
            ethical committee), preferably in URL format
          examples:
            - http://report.location
        language:
          $ref: "#/components/schemas/LanguageCode"
        modified:
          type: string
          format: date-time
          title: Modified
          description: Must be set each time DMP is modified. Indicates a DMP version.
            Encoded using the relevant ISO 8601 Date and Time (with timezone)
            compliant string.
          examples:
            - "2020-03-14T10:53:49Z"
        project:
          type: array
          title: Projects
          description: Projects related to a DMP
          items:
            $ref: "#/components/schemas/Project"
        related_identifier:
          type: array
          items:
            $ref: "#/components/schemas/RelatedIdentifier"
          minItems: 0
        title:
          type: string
          title: Title
          description: Title of a DMP
          examples:
            - DMP for our new project
      required:
        - contact
        - created
        - dataset
        - dmp_id
        - ethical_issues_exist
        - language
        - modified
        - title
    DMPID:
      type: object
      title: DMP ID
      description: Identifier for the DMP itself
      properties:
        identifier:
          type: string
          title: Identifier
          examples:
            - 10.1371/journal.pcbi.1006750
        type:
          type: string
          title: Type
          description: "The DMP Identifier Type. Suggested values: handle, doi, ark, url"
          examples:
            - doi
      required:
        - identifier
        - type
    Distribution:
      type: object
      title: Distribution
      properties:
        access_url:
          type: string
          title: Access URL
          description: A URL of the resource that gives access to a distribution of the
            dataset. e.g. landing page.
          examples:
            - http://some.repo
        available_until:
          type: string
          format: date
          title: Available Until
          description: Indicates how long this distribution will be/ should be available.
            Encoded using the relevant ISO 8601 Date compliant string.
          examples:
            - "2030-06-30"
        byte_size:
          type: integer
          title: Byte Size
          description: Size in bytes.
          examples:
            - 690000
        data_access:
          $ref: "#/components/schemas/DataAccess"
        description:
          type: string
          title: Description
          description: Description is a property in both Dataset and Distribution, in
            compliance with W3C DCAT. In some cases these might be identical, but
            in most cases the Dataset represents a more abstract concept, while
            the distribution can point to a specific file.
          examples:
            - Best quality data before resizing
        download_url:
          type: string
          format: url
          title: Download URL
          description: The URL of the downloadable file in a given format. E.g. CSV file
            or RDF file.
          examples:
            - http://some.repo.../download/...
        format:
          type: array
          title: Format
          description: "Format according to:
            https://www.iana.org/assignments/media-types/media-types.xhtml if
            appropriate, otherwise use the common name for this format."
          items:
            $ref: "#/components/schemas/MIMEType"
        host:
          $ref: "#/components/schemas/Host"
        issued:
          type: string
          format: date
          title: Issued
          description: To indicate a date when a distribution was published or released.
            Encoded using the relevant ISO 8601 Date compliant string.
          examples:
            - "2019-06-30"
        license:
          $ref: "#/components/schemas/Licenses"
        title:
          type: string
          title: Title
          description: Title is a property in both Dataset and Distribution, in compliance
            with W3C DCAT. In some cases these might be identical, but in most
            cases the Dataset represents a more abstract concept, while the
            distribution can point to a specific file.
          examples:
            - Full resolution images
      required:
        - data_access
        - title
    FunderID:
      type: object
      title: Funder ID
      description: Funder ID of the associated project
      properties:
        identifier:
          type: string
          title: Identifier
          description: "Funder ID, recommended to use CrossRef Funder Registry. See:
            https://www.crossref.org/services/funder-registry/"
          examples:
            - "501100002428"
        type:
          type: string
          title: Type
          description: "Identifier type. Suggested values: fundref, url"
          examples:
            - fundref
      required:
        - identifier
        - type
    Funding:
      type: object
      title: Funding
      properties:
        funder_id:
          $ref: "#/components/schemas/FunderID"
        funding_status:
          $ref: "#/components/schemas/FundingStatus"
        grant_id:
          $ref: "#/components/schemas/GrantID"
      required:
        - funder_id
    Fundings:
      type: array
      title: Fundings
      description: Funding related with a project
      items:
        $ref: "#/components/schemas/Funding"
    FundingStatus:
      type: string
      enum:
        - planned
        - applied
        - granted
        - rejected
      title: Funding Status
      description: "To express different phases of project lifecycle. Allowed values:
        planned, applied, granted, rejected"
      examples:
        - granted
    GrantID:
      type: object
      title: Grant ID
      description: Grant ID of the associated project
      properties:
        identifier:
          type: string
          title: Identifier
          examples:
            - http://example.org/grants/776242
        type:
          type: string
          title: Type
          description: "Identifier type. Suggested values: url"
          examples:
            - url
      required:
        - identifier
        - type
    Host:
      type: object
      title: Host
      description: To provide information on quality of service provided by
        infrastructure (e.g. repository) where data is stored.
      properties:
        availability:
          type: string
          title: Availability
          description: Availability of a host (preferably as a percentage)
          examples:
            - 99,5
        backup_frequency:
          type: string
          title: Backup Frequency
          description: Frequency of backups provided by a host
          examples:
            - weekly
        backup_type:
          type: string
          title: Backup Type
          description: Location and/or type of the backup provided by a host
          examples:
            - tapes
        certified_with:
          $ref: "#/components/schemas/Certification"
        description:
          type: string
          title: Description
          examples:
            - Repository hosted by...
        geo_location:
          $ref: "#/components/schemas/CountryCode"
        host_id:
          type: array
          items:
            $ref: "#/components/schemas/HostID"
          minItems: 0
        pid_system:
          $ref: "#/components/schemas/PIDSystems"
        storage_type:
          type: string
          title: Storage Type
          description: To indicate whether a host supports versioning of data distributions.
          examples:
            - External Hard Drive
        support_versioning:
