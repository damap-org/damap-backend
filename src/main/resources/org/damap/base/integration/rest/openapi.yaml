openapi: "3.1.0"
info:
  title: DAMAP integration
  description: This API provides the standard integration endpoints for DAMAP.
  version: 1.0.0
paths:
  /projects:
    get:
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/Query"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Count"
      responses:
        200:
          $ref: "#/components/responses/ListProjectsResponse"
  /projects/{systemProjectID}/contributors:
    get:
      operationId: listProjectContributors
      parameters:
        - name: systemProjectID
          in: path
          required: true
          description: System project ID to fetch contributors for.
          schema:
            $ref: "#/components/schemas/SystemProjectID"
        - $ref: "#/components/parameters/Query"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Count"
      responses:
        "200":
          $ref: "#/components/responses/ListProjectContributorsResponse"
components:
  responses:
    ListProjectsResponse:
      description: A list of projects
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ListProjectsResponseBody"
    ListProjectContributorsResponse:
      description: A list of contributors
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ListProjectContributorsResponseBody"
  parameters:
    Query:
      name: q
      in: query
      required: false
      schema:
        description: "Query for searching items."
        type: string
        minLength: 0
        maxLength: 255
    Offset:
      name: offset
      in: query
      required: false
      schema:
        default: 0
        description: "Number of items to skip from the beginning"
        type: integer
        minimum: 0
        maximum: 10000
    Count:
      name: count
      in: query
      required: false
      schema:
        default: 20
        description: "Number of items to return"
        type: integer
        minimum: 1
        maximum: 100
  schemas:
    ListProjectsResponseBody:
      type: object
      properties:
        totalItems:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
    ListProjectContributorsResponseBody:
      type: object
      properties:
        totalItems:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/Contributor"
    SystemID:
      type: string
      minLength: 1
      maxLength: 255
    SystemContributorID:
      description: "System-dependent ID for a contributor"
      $ref: "#/components/schemas/SystemID"
    SystemProjectID:
      description: "System-dependent ID for a project"
      $ref: "#/components/schemas/SystemID"
    SystemFundingID:
      description: "System-dependent ID for the funding"
      $ref: "#/components/schemas/SystemID"
    Project:
      allOf:
        - type: object
          required:
            - id
          properties:
            id:
              $ref: "#/components/schemas/SystemProjectID"
            funding:
              type: array
              items:
                $ref: "#/components/schemas/Funding"
        - $ref: "https://raw.githubusercontent.com/RDA-DMP-Common/common-madmp-api/refs/heads/bitmotivator/openapi-minimal/openapi.yaml#/components/schemas/Project"
    Funding:
      allOf:
        - type: object
          required:
            - id
          properties:
            id:
              $ref: "#/components/schemas/SystemFundingID"
        - $ref: "https://raw.githubusercontent.com/RDA-DMP-Common/common-madmp-api/refs/heads/bitmotivator/openapi-minimal/openapi.yaml#/components/schemas/Funding"
    Contributor:
      allOf:
        - type: object
          required:
            - id
          properties:
            id:
              $ref: "#/components/schemas/SystemContributorID"
        - $ref: "https://raw.githubusercontent.com/RDA-DMP-Common/common-madmp-api/refs/heads/bitmotivator/openapi-minimal/openapi.yaml#/components/schemas/Contributor"
