databaseChangeLog:
  - changeSet:
      id: 25
      author: Geoffrey Karnbach
      changes:
        - createSequence:
            sequenceName: damap_user_seq
            startValue: 1
            incrementBy: 50

        - createTable:
            tableName: damap_user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: subject
                  type: VARCHAR(255)
              - column:
                  name: nickname
                  type: VARCHAR(255)
              - column:
                  name: is_admin
                  type: BOOLEAN
              - column:
                  name: email
                  type: VARCHAR(255)

      rollback:
        - dropTable:
            tableName: damap_user
        - dropSequence:
            sequenceName: damap_user_seq
