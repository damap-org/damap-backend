databaseChangeLog:
  - changeSet:
        id: 22-0
        author: Geoffrey Karnbach
        changes:
          - createSequence:
              sequenceName: user_account_seq
              startValue: 1
              incrementBy: 1
          - createSequence:
              sequenceName: apikey_seq
              startValue: 1
              incrementBy: 1
          - createSequence:
              sequenceName: user_roles_seq
              startValue: 1
              incrementBy: 1
          - createTable:
              tableName: user_account
              columns:
                - column:
                    name: id
                    type: BIGINT
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: display_name
                    type: VARCHAR(255)
                - column:
                    name: username
                    type: VARCHAR(255)
                    constraints:
                      unique: true
                      nullable: false
                - column:
                    name: user_id
                    type: VARCHAR(255)
                    constraints:
                        unique: true
                        nullable: false
          - createTable:
              tableName: apikey
              columns:
                - column:
                    name: id
                    type: BIGINT
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: user_id
                    type: BIGINT
                    constraints:
                      nullable: false
                - column:
                    name: name
                    type: VARCHAR(255)
                    constraints:
                        nullable: false
                        unique: true
                - column:
                    name: value
                    type: VARCHAR(255)
                    constraints:
                      nullable: false
          - addForeignKeyConstraint:
              baseTableName: apikey
              baseColumnNames: user_id
              referencedTableName: user_account
              referencedColumnNames: id
              constraintName: fk_apikey_user
          - createTable:
              tableName: user_roles
              columns:
                - column:
                    name: id
                    type: BIGINT
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: role
                    type: VARCHAR(100)
                    constraints:
                      nullable: false
                - column:
                    name: user_id
                    type: BIGINT
                    constraints:
                      nullable: false
          - addForeignKeyConstraint:
              baseTableName: user_roles
              baseColumnNames: user_id
              referencedTableName: user_account
              referencedColumnNames: id
              constraintName: fk_userroles_user