                  value: 'dmp.steps.legal.question.answer.no'
              - column:
                  name: language
                  value: en
              - column:
                  name: default_value
                  value: 'No'
              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: version
                  valueNumeric: 0

        # keys missing
