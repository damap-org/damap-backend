              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: version
                  valueNumeric: 0

        # unused
        - delete:
            tableName: translation
            where: translation_key = 'false'
        - delete:
            tableName: translation
            where: translation_key = 'true'

        # missing keys for yes/no
        - insert:
            tableName: translation
            columns:
              - column:
                  name: translation_key
                  value: 'dmp.steps.legal.question.answer.yes'
              - column:
                  name: language
                  value: en
              - column:
                  name: default_value
                  value: 'Yes'
              - column:
                  name: active
                  valueBoolean: true
              - column:
                  name: version
