databaseChangeLog:
  - changeSet:
      id: 30
      author: Geoffrey Karnbach
      comment: Add singleton instance config table
      changes:
        - createTable:
            tableName: instance_config
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_instance_config
                    nullable: false
              - column:
                  name: public_available
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: consent_form_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - insert:
            tableName: instance_config
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: public_available
                  valueBoolean: false
              - column:
                  name: consent_form_enabled
                  valueBoolean: true