{{- if .Values.pure.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: damap-pure
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: damap-pure
stringData:
  persons.json: {{ .Values.pure.persons_data | toJson | quote }}
  projects.json: {{ .Values.pure.projects_data | toJson | quote }}
{{- end }}
