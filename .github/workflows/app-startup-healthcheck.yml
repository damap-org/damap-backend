name: Continuous Integration Check

on:
  push:
    branches:
      - master
      - next
  pull_request:
  workflow_dispatch:

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker compose -f docker/docker-compose.yaml build damap-be

      - name: Start containers
        run: docker compose -f docker/docker-compose.yaml up -d --no-build

      - name: Run health check
        run: |
              set -e
              for i in $(seq 1 10); do
                echo "Attempt $i..."
                sleep 5
                response=$(curl -s -w "%{http_code}" -o /dev/null http://localhost:8085)
                echo -e "Status code: $response"
                if [ "$response" == "200" ]; then
                  echo "Health check passed after $i attempt(s)."
                  break
                fi
              done

              if [ "$response" != "200" ]; then
                echo "Health check failed after 10 attempts."
                exit 1
              fi

  maven-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Maven Action
        uses: s4u/setup-maven-action@v1.12.0
        with:
          java-version: "17"
          maven-version: "3.9.5"

      - name: Build with Maven
        run: mvn -B -T $(nproc) install

      - name: Run Sonar analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -Psonar
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=tuwien-csd
          -Dsonar.projectKey=tuwien-csd_damap-backend
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.coverage.exclusions=docker/**/*,
          sonar:sonar