# Helm chart publishing workflow
# - Publishes OCI Helm charts from the `next` branch
# - Chart versions must be bumped manually in Chart.yaml

name: release helm

env:
  REGISTRY: ghcr.io

on:
  push:
    branches:
      - next
    paths:
      - "helm/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  helm-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Compute Chart metadata
        id: chart
        run: |
          name=$(grep '^name:' helm/Chart.yaml | awk '{print $2}')
          version=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')

          echo "name=$name" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Helm Lint
        run: helm lint helm/

      - name: Package Helm chart
        run: helm package helm/ --destination ./

      - name: Push Helm Chart to GHR
        run: |
          helm push ${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}.tgz \
          oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

