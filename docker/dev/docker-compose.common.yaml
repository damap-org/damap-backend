services:
  frontend:
    # Since DAMAP containers are publicly available on GitHub packages one can
    # just pull the latest container image.
    image: ghcr.io/damap-org/damap-frontend:next
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      default:
        aliases:
          - damap-fe
    # Assumed to be checked-out beside the 'damap-backend' repository.
    # If you want to test changes to the frontend, you can build the image
    # locally by commenting the 'image' line above.
    build:
      context: ../../damap-frontend

  proxy:
    # Since several components share the same ports and address, this docker
    # configuration needs a proxy to manage the connections between them,
    # as well as access from the outside.
    image: nginx:1
    restart: unless-stopped
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf
    ports:
      - "8085:80"
    depends_on:
      - frontend
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    pull_policy: always
    restart: unless-stopped
    command:
      - start
      - --http-enabled=true
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:8087}
      # Only needed if hostname is localhost
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: ${KC_HOSTNAME_BACKCHANNEL_DYNAMIC:-true}
    ports:
      - "8087:8080"
    volumes:
      - ./sample-damap-realm-export.json:/opt/keycloak/data/import/damap-realm-import.json
    depends_on:
      - keycloak-db
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/bin/bash"
        - "-c"
        - |
          exec 3<>/dev/tcp/localhost/8080
          echo -e "GET /health/ready HTTP/1.1\nhost: localhost:8080\nconnection: close\n\n" >&3
          test "$(cat <&3 | grep -m 1 'HTTP/1.1 ')" = "HTTP/1.1 200 OK"
          exec 3<&-
          exec 3>&-
          exit $?
      start_period: 120s
      interval: 30s
      timeout: 15s
      retries: 5

  keycloak-db:
    image: postgres:16
    pull_policy: always
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
      DB_VENDOR: postgres

  api-mock:
    image: clue/json-server
    pull_policy: always
    restart: unless-stopped
    command: db.json --routes routes.json
    volumes:
      - ./api-mock/data/db.json:/data/db.json
      - ./api-mock/data/routes.json:/data/routes.json
    ports:
      - "8091:80"
    networks:
      default:
        aliases:
          - api-mock
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8091/" ]
      interval: 30s
      timeout: 15s
      retries: 5

  fits:
    image: islandora/fits:main
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8089:8080"

  gotenberg:
    image: gotenberg/gotenberg:8
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3000:3000"
