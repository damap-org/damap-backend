# This file contains a development setup of DAMAP as a Docker Compose file.
# NOTE: This is NOT intended for production use!

name: damap-dev

include:
  - docker-compose.common.yaml

services:
  backend:
    image: ghcr.io/damap-org/damap-backend:next
    build:
      context: ../../
    restart: unless-stopped
    environment:
      # Optional database configuration values, can be overridden by environment variables.
      # This is useful in case the database host/port/name are different from the defaults.
      # Prefixed with DAMAP_ (not Quarkus-specific), used to build the full JDBC URL.
      DAMAP_DB_HOST: ${DAMAP_DB_HOST:-}
      DAMAP_DB_PORT: ${DAMAP_DB_PORT:-}
      DAMAP_DB_NAME: ${DAMAP_DB_NAME:-}
      QUARKUS_DATASOURCE_DB_KIND: ${DAMAP_QUARKUS_DATASOURCE_DB_KIND:-postgresql}
      QUARKUS_DATASOURCE_USERNAME: ${DAMAP_QUARKUS_DATASOURCE_USERNAME:-damap}
      QUARKUS_DATASOURCE_PASSWORD: ${DAMAP_QUARKUS_DATASOURCE_PASSWORD:-pw4damap}
      QUARKUS_PROFILE: ${DAMAP_QUARKUS_PROFILE:-}
    volumes:
      - ../tenants.yaml:/opt/damap/tenants.yaml:ro
    depends_on:
      postgres-db:
        condition: service_started
        required: false
      oracle-db:
        condition: service_started
        required: false
      keycloak:
        condition: service_healthy
      api-mock:
        condition: service_started
      fits:
        condition: service_started
      gotenberg:
        condition: service_started
    networks:
      default:
        aliases:
          - damap-be
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/q/health/live" ]
      interval: 30s
      timeout: 15s
      retries: 5

  postgres-db:
    image: postgres:16
    pull_policy: always
    restart: unless-stopped
    profiles:
      - "" # default profile, active when no profile is specified
      - with_postgres
    environment:
      POSTGRES_USER: damap
      POSTGRES_PASSWORD: pw4damap
      POSTGRES_DB: damap
    ports:
      - "8088:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U damap -d damap'" ]
      interval: 30s
      timeout: 15s
      retries: 5

  oracle-db:
    image: gvenzl/oracle-free:23-slim
    pull_policy: always
    restart: unless-stopped
    profiles:
      - with_oracle
    environment:
      ORACLE_PASSWORD: ${DAMAP_QUARKUS_DATASOURCE_PASSWORD:-pw4damap}
      APP_USER: ${DAMAP_QUARKUS_DATASOURCE_USERNAME:-damap}
      APP_USER_PASSWORD: ${DAMAP_QUARKUS_DATASOURCE_PASSWORD:-pw4damap}
    ports:
      - "8088:1521"
    volumes:
      - ora-data:/opt/oracle/oradata
    healthcheck:
      test: [ "CMD-SHELL", "healthcheck.sh" ]
      interval: 30s
      timeout: 15s
      retries: 5

volumes:
  pg-data:
  ora-data:
