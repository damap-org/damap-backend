include:
  - docker-compose.common.yaml

services:
  damap-be:
    # Since DAMAP containers are publicly available on GitHub packages one can
    # just pull the latest container image.
    image: ghcr.io/damap-org/damap-backend:next
    build:
      context: ../
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE: ${QUARKUS_PROFILE}
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:oracle:thin:@damap-db:1521/FREEPDB1"
      QUARKUS_HIBERNATE_ORM_DIALECT: "org.hibernate.dialect.OracleDialect"
      QUARKUS_DATASOURCE_JDBC_DRIVER: "oracle.jdbc.driver.OracleDriver"
      QUARKUS_DATASOURCE_DB_KIND: "oracle"
      QUARKUS_DATASOURCE_USERNAME: ${QUARKUS_DATASOURCE_USERNAME:-damap}
      QUARKUS_DATASOURCE_PASSWORD: ${QUARKUS_DATASOURCE_PASSWORD:-pw4damap}
    volumes:
      - ./tenants.yaml:/opt/damap/tenants.yaml:ro
    depends_on:
      - damap-db
      - keycloak
      - api-mock
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/q/health/live" ]
      interval: 30s
      timeout: 15s
      retries: 5

  damap-db:
    image: gvenzl/oracle-free:23-slim
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: pw4damap
      APP_USER: damap
      APP_USER_PASSWORD: pw4damap
    ports:
      - "8088:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: [ "CMD-SHELL", "healthcheck.sh" ]
      interval: 30s
      timeout: 15s
      retries: 5

volumes:
  oracle-data:
