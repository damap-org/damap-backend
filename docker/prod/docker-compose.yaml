## This file contains a production-grade setup of DAMAP as a Docker Compose file.
# NOTE: You should still review the security aspects of the setup before using it in production!

name: damap

include:
  - docker-compose.auxiliary.yaml
  - docker-compose.configs.yaml

services:
  backend:
    image: ghcr.io/damap-org/damap-backend:next
    restart: unless-stopped
    environment:
      DAMAP_ENV: PROD
      DAMAP_TITLE: ${DAMAP_TITLE:-DAMAP Tool}
      # --- Database settings --- #
      QUARKUS_DATASOURCE_JDBC_URL: "${DAMAP_QUARKUS_DATASOURCE_JDBC_URL:-jdbc:postgresql://${DAMAP_DATABASE_HOST:-damap-db}:5432/${DAMAP_DATABASE_NAME?The DAMAP database name is required}}"
      QUARKUS_DATASOURCE_JDBC_DRIVER: ${DAMAP_QUARKUS_DATASOURCE_JDBC_DRIVER:-org.postgresql.Driver}
      QUARKUS_DATASOURCE_DB_KIND: ${DAMAP_QUARKUS_DATASOURCE_DB_KIND:-postgresql}
      QUARKUS_DATASOURCE_JDBC_USERNAME: "${DAMAP_DATABASE_USERNAME?The DAMAP datasource username is required}"
      QUARKUS_DATASOURCE_JDBC_PASSWORD: "${DAMAP_DATABASE_PASSWORD?The DAMAP datasource password is required}"
      # --- OIDC / Auth settings --- #
      QUARKUS_HTTP_CORS_ORIGINS: "${DAMAP_QUARKUS_HTTP_CORS_ORIGINS?The DAMAP origins setting is required}"
      QUARKUS_OIDC_AUTH_SERVER_URL: "${DAMAP_QUARKUS_OIDC_AUTH_SERVER_URL?The OIDC AUTH SERVER URL is required}"
      QUARKUS_OIDC_TOKEN_ISSUER: "${DAMAP_QUARKUS_OIDC_TOKEN_ISSUER?The OIDC TOKEN ISSUER URL is required}"
      QUARKUS_OIDC_CLIENT_ID: "${DAMAP_QUARKUS_OIDC_CLIENT_ID?The OIDC CLIENT ID is required}"
      QUARKUS_OIDC_ROLES_ROLE_CLAIM_PATH: "${DAMAP_QUARKUS_OIDC_ROLES_ROLE_CLAIM_PATH?The OIDC ROLE CLAIM PATH is required}"
      # --- DAMAP PURE integration defaults --- #
      DAMAP_ELSEVIER_PURE_BACKEND: ${DAMAP_ELSEVIER_PURE_BACKEND:-file}
      DAMAP_ELSEVIER_PURE_ENABLED: ${DAMAP_ELSEVIER_PURE_ENABLED:-true}
      DAMAP_ELSEVIER_PURE_ENDPOINT_URL: ${DAMAP_ELSEVIER_PURE_ENDPOINT_URL:-""}
      DAMAP_ELSEVIER_PURE_PERSONS_FILE: ${DAMAP_ELSEVIER_PURE_PERSONS_FILE:-file:////opt/damap/config/pure-persons-data.json}
      DAMAP_ELSEVIER_PURE_PROJECTS_FILE: ${DAMAP_ELSEVIER_PURE_PROJECTS_FILE:-file:////opt/damap/config/pure-projects-data.json}
      # --- Settings needed for DAMAP to use the Person and Projects services --- #
      DAMAP_PERSON_SERVICES: ${DAMAP_PERSON_SERVICES:-[{"display-text":"Pure","query-value":"PURE","class-name":"org.damap.base.integration.pure.PurePersonService"},{"display-text":"ORCID","query-value":"ORCID","class-name":"org.damap.base.integration.orcid.ORCIDPersonServiceImpl"}]}
      DAMAP_PROJECTS_SERVICE: ${DAMAP_PROJECTS_SERVICE:-elsevier-pure}
    volumes:
      - ../tenants.yaml:/opt/damap/tenants.yaml:ro
    expose:
      - 8080
    configs:
      - source: pure-persons-data
        target: ${DAMAP_ELSEVIER_PURE_PERSONS_FILE:-/opt/damap/config/pure-persons-data.json}
      - source: pure-projects-data
        target: ${DAMAP_ELSEVIER_PURE_PROJECTS_FILE:-/opt/damap/config/pure-projects-data.json}
    depends_on:
      db:
        condition: service_healthy
        required: false # We don't require this since the DB only exists when the with_db profile is enabled.
      keycloak:
        condition: service_healthy
        required: false # We don't require this since the DB only exists when the with_keycloak profile is enabled.
      gotenberg:
        condition: service_started
    networks:
      damap-internal:
        aliases:
          - damap-be
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/q/health/live" ]
      start_period: 120s
      interval: 30s
      timeout: 15s
      retries: 5

  db:
    image: postgres:16
    pull_policy: always
    restart: unless-stopped
    profiles:
      - with_db
    environment:
      PGDATA: /var/lib/postgresql/data/damap-db
      POSTGRES_USER: ${DAMAP_DATABASE_USERNAME?The DAMAP datasource username is required}
      POSTGRES_PASSWORD: ${DAMAP_DATABASE_PASSWORD?The DAMAP datasource password is required}
      POSTGRES_DB: ${DAMAP_DATABASE_NAME?The DAMAP database name is required}
    volumes:
      - ${DAMAP_DATABASE_HOST_PATH?Please specify a path for the database.}:/var/lib/postgresql/data
    networks:
      damap-internal:
        aliases:
          - damap-db
    healthcheck:
      test: [ "CMD", "/bin/sh", "-c", "/usr/bin/pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 5s
      start_period: 5s
      timeout: 15s
      retries: 5

  frontend:
    image: ghcr.io/damap-org/damap-frontend:next
    restart: unless-stopped
    expose:
      - 8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      damap-internal:
        aliases:
          - damap-fe
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/" ]
      start_period: 120s
      interval: 30s
      timeout: 15s
      retries: 5

  proxy:
    image: nginx:1
    pull_policy: always
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/generate-keycloak-conf.sh:/docker-entrypoint.d/99-keycloak-routes.sh:ro
      - logs:/var/log
    configs:
      - source: nginx
        target: /etc/nginx/nginx.conf
    secrets:
      - certificate
      - private_key
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      damap-internal:
      damap-external:
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/q/health/live" ]
      start_period: 120s
      interval: 30s
      timeout: 15s
      retries: 5

  gotenberg:
    image: gotenberg/gotenberg:8
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      damap-internal:

secrets:
  certificate:
    file: ./tls/bundle.crt
  private_key:
    file: ./tls/private.pem

volumes:
  logs:
    name: logs
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "${PROXY_LOGS_HOST_PATH?Please specify a logs path.}"

networks:
  damap-external:
    name: damap-external
  damap-internal:
    name: damap-internal
    internal: true
