    name: logs
    driver: local
    driver_opts:
      o: bind
      type: none
      device: "${PROXY_LOG_HOST_PATH?Please specify a log path.}"

networks:
  damap-external:
    name: damap-external
  damap-internal:
    name: damap-internal
    internal: true
