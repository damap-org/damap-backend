include:
  - docker-compose.keycloak.config.yaml

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    profiles:
      - with_keycloak
    command:
      - start
      - --hostname=https://${DAMAP_HOSTNAME?Please provide a hostname for Keycloak}
      - --hostname-backchannel-dynamic
      - "true"
      - --http-enabled=true
      - --proxy-headers
      - xforwarded
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN_USER?Please provide an admin user for Keycloak}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD?Please provide an admin password for Keycloak}"
      KC_HOSTNAME: "${DAMAP_HOSTNAME?Please provide a hostname for DAMAP}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://${KEYCLOAK_DATABASE_HOST:-keycloak-db}:5432/${KEYCLOAK_DATABASE_NAME?The Keycloak database name is required}"
      KC_DB_USERNAME: "${KEYCLOAK_DATABASE_USERNAME?Please provide a Keycloak database user}"
      KC_DB_PASSWORD: "${KEYCLOAK_DATABASE_PASSWORD?Please provide a Keycloak database user}"
    configs:
      - source: damap-realm-import
        target: /opt/keycloak/data/import/damap-realm-import.json
    depends_on:
      keycloak-db:
        condition: service_healthy
        required: false # We don't require this since the DB only exists when the with_keycloak_db profile is enabled.
    networks:
      damap-internal:
        aliases:
          - keycloak
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/bin/bash"
        - "-c"
        - |
          exec 3<>/dev/tcp/localhost/8080
          echo -e "GET /health/ready HTTP/1.1\nhost: localhost:8080\nconnection: close\n\n" >&3
          test "$(cat <&3 | grep -m 1 'HTTP/1.1 ')" = "HTTP/1.1 200 OK"
          exec 3<&-
          exec 3>&-
          exit $?

  keycloak-db:
    image: postgres:16
    profiles:
      - with_keycloak_db
    environment:
      PGDATA: /var/lib/postgresql/data/keycloak-db
      POSTGRES_USER: ${KEYCLOAK_DATABASE_USERNAME?The Keycloak datasource username is required}
      POSTGRES_PASSWORD: ${KEYCLOAK_DATABASE_PASSWORD?The Keycloak datasource password is required}
      POSTGRES_DB: ${KEYCLOAK_DATABASE_NAME?The Keycloak database name is required}
    volumes:
      - ${KEYCLOAK_DATABASE_HOST_PATH?Please specify a path for the database.}:/var/lib/postgresql/data
    networks:
      damap-internal:
        aliases:
          - keycloak-db
    healthcheck:
      test: [ "CMD", "/bin/sh", "-c", "/usr/bin/pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 5s
      start_period: 5s
      timeout: 15s
      retries: 5
