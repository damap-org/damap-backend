openshift: false
debug: true
damap:
  use_existing_secret: false
  frontend_image: "ghcr.io/damap-org/damap-frontend:next"
  backend_image: "ghcr.io/damap-org/damap-backend:next"
  db_name: damap
  db_user: damap
  # NOTE: When db_password is empty, Helm will try to reuse the existing Secret if present.
  # In a KinD setup, if the Secret is deleted (e.g., on 'helm delete') but the DB volume persists,
  # a new password will be generated.
  # This mismatch can cause DB/service failures. Use a fixed password or pre-created Secret to ensure stability.
  db_password: "damap_pass" # Empty defaults to auto-generate.
  hostname: localhost
  custom_domain: false
  protocol: http
  ingress_class: ""
  tls_issuer: ""
  storage_class_name: ""
  # Host folder for demo / small scale deployments. Do not use for production!
  create_pv: true
  host_folder: /tmp/damap
  person_services:
    # Elsevier Pure integration (pure.enabled must be true for this to work):
    # NOTE: PURE must come before ORCID here, otherwise the ORCID will always be used.
    - display-text: "Pure"
      query-value: "PURE"
      class-name: "org.damap.base.integration.pure.PurePersonService"
    - display-text: "ORCID"
      query-value: "ORCID"
      class-name: "org.damap.base.integration.orcid.ORCIDPersonServiceImpl"
  projects_service: elsevier-pure
oidc:
  # The endpoint the DAMAP frontend should use from the browser. This should be
  # accessible from the user's computer. This setting will be ignored if
  # keycloak.deploy is true.
  frontend_endpoint: https://...
  # The endpoint the DAMAP backend should use. Typically, this is the same as
  # the frontend, but sometimes you may want to route the backend requests
  # over a different network. This setting will be ignored if keycloak.deploy
  # is true.
  backend_endpoint: https://...
  # OIDC client ID the backend should use.
  # Note: you will have to configure these in your OIDC server!
  backend_client_id: damap
  # OIDC client ID the frontend should use.
  # Note: you will have to configure these in your OIDC server!
  frontend_client_id: damap
  # OIDC scopes
  scope:
    - openid
    - profile
    - email
    - offline_access
    - microprofile-jwt
    - roles
    - personID
  # Claim for the person ID:
  person_id_claim: personID
keycloak:
  use_existing_secret: false
  # Set this to false in order to use your own OIDC server:
  deploy: true
  admin_user: admin
  admin_password: "" # Defaults to auto-generated, check the keycloak secret for the password after deployment
  db_name: keycloak
  db_user: keycloak
  db_password: "keycloak123" # Empty defaults to auto-generate
  hostname: localhost
  custom_domain: false
  protocol: http
  ingress_class: ""
  tls_issuer: ""
  storage_class_name: ""
  # Host folder for demo / small scale deployments. Do not use for production!
  create_pv: true
  host_folder: /tmp/keycloak
# Create a custom backend build using the OpenShift CI pipeline.
# Sadly, this doesn't work in vanilla Kubernetes.
custom_build:
  name: ""
  repo: https://github.com/damap-org/damap-backend
  ref: "next"
