{{- if .Values.openshift -}}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  namespace: {{ .Values.namespace }}
  annotations:
    haproxy.router.openshift.io/hsts_header: "max-age=31536000;includeSubDomains;preload"
spec:
  host: "{{ .Values.keycloak.hostname }}"
  path: /
  to:
    name: keycloak
    weight: 100
    kind: Service
  wildcardPolicy: None
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
{{ else -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: "{{ .Values.namespace }}"
spec:
  rules:
    - host: "{{ .Values.keycloak.hostname }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
{{- end -}}