{{ if .Values.keycloak.deploy }}
{{ if .Values.keycloak.create_pv }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: keycloak-db
  namespace: {{ .Release.Namespace }}
spec:
  storageClassName: "{{ .Values.keycloak.storage_class_name }}"
  claimRef:
    namespace: "{{ .Release.Namespace }}"
    name: keycloak-db
  capacity:
    storage: 5G
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  hostPath:
    path: {{ .Values.keycloak.host_folder }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-db
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5G
  storageClassName: "{{ .Values.keycloak.storage_class_name }}"
  volumeMode: Filesystem
{{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: keycloak
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      volumes:
        - name: keycloak
          secret:
            secretName: keycloak
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2
          resources:
            requests:
              cpu: 10m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              memory: 2G
              cpu: "0.5"
              ephemeral-storage: 2Gi
          args:
            - start
            - --hostname={{ .Values.keycloak.hostname }}
            - --http-enabled=true
            - --proxy-headers
            - forwarded
            - --import-realm
          env:
            - name: KC_LOG_LEVEL_ORG_KEYCLOAK
              value: debug
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: admin_user
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: admin_password
            - name: KC_HOSTNAME
              value: "{{ .Values.keycloak.hostname }}"
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://keycloak-db:5432/{{ .Values.keycloak.db_name }}"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: db_username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: db_password
          ports:
            - containerPort: 8080
          volumeMounts:
            - mountPath: /opt/keycloak/data/import/damap-realm-import.json
              name: keycloak
              subPath: damap-realm-import
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - "ALL"
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: keycloak-db
spec:
  selector:
    app: keycloak-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-db
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: keycloak-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: keycloak-db
  template:
    metadata:
      labels:
        app: keycloak-db
    spec:
      securityContext:
        # runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
{{ if .Values.keycloak.create_pv }}
      volumes:
      - name: keycloak-db
        persistentVolumeClaim:
          claimName: keycloak-db
{{ end }}
      containers:
        - name: keycloak-db
          image: postgres:16
          resources:
            requests:
              cpu: 10m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              memory: 2G
              cpu: "0.25"
              ephemeral-storage: 2Gi
{{ if .Values.keycloak.create_pv }}
          volumeMounts:
            - name: keycloak-db
              mountPath: /var/lib/postgresql/data
{{ end }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/keycloak-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: db_username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: db_password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: db_database
          ports:
            - containerPort: 5432
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - /usr/bin/pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
          # securityContext:
          #   allowPrivilegeEscalation: false
          #   # runAsNonRoot: true
          #   seccompProfile:
          #     type: RuntimeDefault
          #   capabilities:
          #     drop:
          #       - "ALL"
{{ end }}